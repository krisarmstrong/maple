# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
name: maple
arch: ${MAPLE_PACKAGE_ARCH}
platform: linux
version: ${MAPLE_PACKAGE_VERSION}
version_schema: semver
release: ${MAPLE_PACKAGE_RELEASE}
section: utils
priority: optional
maintainer: Kris Armstrong
description: Desktop workbench for user-installed Nmap scans.
vendor: Maple
homepage: https://github.com/krisarmstrong/maple
license: Proprietary
recommends:
  - nmap
overrides:
  deb:
    depends:
      - libgtk-3-0
      - ${MAPLE_DEB_WEBKIT_DEP}
  rpm:
    depends:
      - gtk3
      - ${MAPLE_RPM_WEBKIT_DEP}
contents:
  - src: build/bin/maple
    dst: /usr/bin/maple
    file_info:
      mode: 0755
  - src: build/appicon.png
    dst: /usr/share/icons/hicolor/256x256/apps/maple.png
    file_info:
      mode: 0644
  - src: packaging/linux/maple.desktop
    dst: /usr/share/applications/maple.desktop
    file_info:
      mode: 0644
