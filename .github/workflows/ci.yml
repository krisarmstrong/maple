name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      GO_BUILD_TAGS: desktop,wv2runtime.download,production,webkit2_41
      GO_BASE_LDFLAGS: -w -s
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ./.github/actions/setup-go

      - uses: ./.github/actions/setup-node

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev shellcheck

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install security scanners
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install browser smoke dependencies
        run: npm --prefix frontend exec playwright install --with-deps chromium

      - name: Release candidate gate
        run: make rc-check
