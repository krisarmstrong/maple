name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to stamp into Linux packages, without a leading v.
        required: true
        default: 0.1.0-rc.1

permissions:
  contents: write

jobs:
  validate:
    name: Release candidate gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-go

      - uses: ./.github/actions/setup-node

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install security scanners
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew install shellcheck
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install browser smoke dependencies
        run: npm --prefix frontend run test:e2e:install

      - name: Run release candidate gate
        run: make rc-check

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos
            runner: macos-15
            platform: darwin/arm64
            package_arch: arm64
            build_tags: desktop,wv2runtime.download,production
            ldflags: "-w -s -extldflags '-framework UniformTypeIdentifiers'"
            wails_flags: ""
            archive_ext: tar.gz
          - name: linux-amd64
            os: linux
            runner: ubuntu-24.04
            platform: linux/amd64
            package_arch: amd64
            build_tags: desktop,wv2runtime.download,production,webkit2_41
            deb_webkit_dep: libwebkit2gtk-4.1-0
            rpm_webkit_dep: webkit2gtk4.1
            ldflags: "-w -s"
            wails_flags: ""
            archive_ext: tar.gz
          - name: linux-arm64
            os: linux
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            package_arch: arm64
            build_tags: desktop,wv2runtime.download,production,webkit2_41
            deb_webkit_dep: libwebkit2gtk-4.1-0
            rpm_webkit_dep: webkit2gtk4.1
            ldflags: "-w -s"
            wails_flags: ""
            archive_ext: tar.gz
          - name: windows-amd64
            os: windows
            runner: windows-2025
            platform: windows/amd64
            package_arch: amd64
            build_tags: desktop,wv2runtime.download,production
            ldflags: "-w -s"
            wails_flags: "-webview2 download -nsis"
            archive_ext: zip
          - name: windows-arm64
            os: windows
            runner: windows-11-arm
            platform: windows/arm64
            package_arch: arm64
            build_tags: desktop,wv2runtime.download,production
            ldflags: "-w -s"
            wails_flags: "-webview2 download -nsis"
            archive_ext: zip

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-go

      - uses: ./.github/actions/setup-node

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Windows installer dependencies
        if: matrix.os == 'windows'
        run: |
          choco install nsis -y
          printf '%s\n' \
            'C:\Program Files (x86)\NSIS' \
            'C:\Program Files\NSIS' \
            >> "$GITHUB_PATH"

      - name: Verify Windows installer dependencies
        if: matrix.os == 'windows'
        run: makensis -VERSION

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install nFPM
        if: matrix.os == 'linux'
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build native package
        run: |
          package_version="${{ github.event.inputs.version }}"
          if [[ -z "$package_version" ]]; then
            build_version="${GITHUB_REF_NAME}"
          elif [[ "$package_version" == v* ]]; then
            build_version="$package_version"
          else
            build_version="v${package_version}"
          fi
          make package-platform \
            VERSION="$build_version" \
            PACKAGE_PLATFORM="${{ matrix.platform }}" \
            PACKAGE_BUILD_TAGS="${{ matrix.build_tags }}" \
            PACKAGE_LDFLAGS="${{ matrix.ldflags }}" \
            WAILS_PLATFORM_FLAGS="${{ matrix.wails_flags }}"

      - name: Build macOS installer
        if: matrix.os == 'macos'
        run: |
          package_version="${{ github.event.inputs.version }}"
          if [[ -z "$package_version" ]]; then
            package_version="${GITHUB_REF_NAME#v}"
          fi
          make package-macos-pkg PACKAGE_VERSION="$package_version" PACKAGE_ARCH="${{ matrix.package_arch }}"

      - name: Build Linux installers
        if: matrix.os == 'linux'
        run: |
          package_version="${{ github.event.inputs.version }}"
          if [[ -z "$package_version" ]]; then
            package_version="${GITHUB_REF_NAME#v}"
          fi
          mkdir -p dist
          make package-linux-deb PACKAGE_VERSION="$package_version" PACKAGE_ARCH="${{ matrix.package_arch }}" PACKAGE_DEB_WEBKIT_DEP="${{ matrix.deb_webkit_dep }}" PACKAGE_RPM_WEBKIT_DEP="${{ matrix.rpm_webkit_dep }}"
          make package-linux-rpm PACKAGE_VERSION="$package_version" PACKAGE_ARCH="${{ matrix.package_arch }}" PACKAGE_DEB_WEBKIT_DEP="${{ matrix.deb_webkit_dep }}" PACKAGE_RPM_WEBKIT_DEP="${{ matrix.rpm_webkit_dep }}"

      - name: Archive platform output
        env:
          ARTIFACT_NAME: maple-${{ matrix.name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          mkdir -p dist
          if [[ "$ARCHIVE_EXT" == "zip" ]]; then
            powershell.exe -NoProfile -Command "Compress-Archive -Path 'build/bin/*' -DestinationPath 'dist/${ARTIFACT_NAME}.zip' -Force"
          else
            tar -czf "dist/${ARTIFACT_NAME}.tar.gz" -C build/bin .
          fi

      - name: Generate checksums
        env:
          ARTIFACT_NAME: maple-${{ matrix.name }}
        run: |
          (
            cd dist
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -- * | sort -k 2 > "${ARTIFACT_NAME}-SHA256SUMS.txt"
            else
              sha256sum -- * | sort -k 2 > "${ARTIFACT_NAME}-SHA256SUMS.txt"
            fi
          )

      - name: Verify release artifacts
        env:
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          PACKAGE_ARCH: ${{ matrix.package_arch }}
        run: |
          package_version="${{ github.event.inputs.version }}"
          if [[ -z "$package_version" ]]; then
            package_version="${GITHUB_REF_NAME#v}"
          fi
          scripts/verify-release-artifacts.sh \
            "${{ matrix.os }}" \
            "${{ matrix.name }}" \
            "$package_version" \
            "$PACKAGE_ARCH" \
            "$ARCHIVE_EXT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: maple-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Maple $tag"
          fi
          find release-artifacts -maxdepth 3 -type f -print0 | xargs -0 gh release upload "$tag" --clobber
